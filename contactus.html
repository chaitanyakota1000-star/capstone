<!DOCTYPE html>
<html>
<head>
 <title>Contact Us  </title>
</head>

<style>
 body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #85edbb, #e2e8f0);
    }

 .background-img{
  width:100vw;
  height:100vh;
  background-repeat:no-repeat;
  background-size:cover;
  display:flex; 
 justify-content:center;
 align-items:center;
 background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
}
.box{
 height:500px;
 width:450px;
 background-color:white;
 
 border-radius:2px;
 border:2px solid white;
 margin:30px;
 padding:20px;
 text-align:center;
 font-size:20px;
 text-decoration:none;
   
 
}
 input{
 height:25px;
 width:50%;
 background-color:#d3dde6;
 margin:5px;
 border-radius:3px;
 
}
.button{
width:150px;
background-color:#ccdce8;
border:3px solid black;
}
</style>

<body>

<div class="background-img">
  <div class="box">
    <h1 style="color:#eba51a">Contact Us </h1>
       <form>
      <label for="email" >Enter email Id: </label><br>
      <input id="email" name="email"  type="text"><br>

    <label for="username" >Enter Username: </label><br>
      <input id="username" name="username" type="text"><br>
   <label for="message box">Message box: </label><br>
   <textarea style="background-color:#f2f4f5;" rows="10" cols="25"></textarea><br>

      
      <button class="button"> Submit message </button>
    </form>     
  </div>

</div>
    
</body>


</html>
