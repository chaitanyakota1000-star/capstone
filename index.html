<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Website</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .bg-image {
            min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url("https://images.pexels.com/photos/807598/pexels-photo-807598.jpeg");
            background-size: cover;
            background-position: center;
        }

        .box {
            display: flex;
            align-items: center;
            min-height: 60px;
            background-color: #74a878;
            justify-content: space-between;
            padding: 5px 15px;
            flex-wrap: wrap; 
        }

        .logo {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .logo img {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .link {
            display: flex;
            flex-wrap: nowrap;
        }

        .link a {
            color: white;
            font-size: 14px;
            padding: 5px 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .img-text {
            text-align: left;
            padding: 100px 50px;
            color: white;
        }

        .img-text h1 {
            font-size: 50px;
            margin: 0;
        }

        .img-text p {
            font-size: 20px;
            max-width: 600px;
        }

        .button1 {
            padding: 12px 25px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .box {
                justify-content: space-around;
            }

            .logo-text {
                font-size: 16px;
            }

            .link a {
                font-size: 12px;
                padding: 5px;
            }

            .img-text {
                padding: 60px 20px;
                text-align: center;
            }

            .img-text h1 {
                font-size: 28px;
            }

            .img-text p {
                font-size: 15px;
            }

            .button1 {
                width: 100%;
                margin-right: 0;
                display: block;
            }
        }

        @media (max-width: 360px) {
            .logo-text {
                display: none; 
            }
        }
    </style>
</head>

<body>

    <div class="bg-image">

        <div class="box">
            <div class="logo">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQXe3wDOXgE9lJNzS8wYVSnR4AyEhLAur7-HA&s" alt="Logo">
                <span class="logo-text">ShopNew</span>
            </div>

            <div class="link">
                <a href="experiment1on_capstone.html">Home</a>
                <a href="contactus.html">Contact</a>
                <a href="login.html">Login</a>
            </div>
        </div>

        <div class="img-text">
            <h1>Sale 50% off on products!</h1>
            <h1>On everything</h1>
            <p>
                A sale is a special event where products are offered at lower prices than usual to attract more customers. 
                During a sale, shops and online stores give discounts on items like clothes, electronics, and groceries.
            </p>

            <a href="experiment1on_capstone.html"><button class="button1">Shop Now</button></a>
            <a href="signuppage.html"><button class="button1">Signup</button></a>
            <a href="login.html"><button class="button1">Login</button></a>
        </div>

    </div>

</body>
</html>
